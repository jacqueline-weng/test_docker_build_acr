# =============================================================================
# Serverless Devs 部署配置
# 阿里云函数计算 FC 部署模板（简单测试服务）
# =============================================================================

edition: 3.0.0
name: simple-test-service
access: default

vars:
  region: cn-hangzhou
  serviceName: simple-test-service
  functionName: simple-test

resources:
  simple_test:
    component: fc3
    props:
      region: ${vars.region}
      
      # 服务配置
      service:
        name: ${vars.serviceName}
        description: "FC简单测试服务"
      
      # 函数配置
      function:
        name: ${vars.functionName}
        description: "基于FastAPI的简单测试服务"
        runtime: custom-container
        
        # 容器镜像配置
        customContainerConfig:
          image: registry.cn-hangzhou.aliyuncs.com/neuron_db_3b/simple-test:v1.0.0
          port: 9000
        
        # 实例规格 - 使用 CPU 实例（测试服务不需要 GPU）
        cpu: 0.5
        memorySize: 256  # 256MB 内存足够
        diskSize: 512    # 512MB 磁盘
        
        # 超时配置
        timeout: 60
        initializationTimeout: 60
        
        # 并发配置
        instanceConcurrency: 100
        
        # 环境变量
        environmentVariables:
          PORT: "9000"
        
        # NAS 挂载配置（用于测试文件读取）
        # nasConfig:
        #   mountPoints:
        #     - serverAddr: "your-nas-server.cn-hangzhou.nas.aliyuncs.com:/"
        #       mountDir: "/data"
        #       nasPath: "/test-data"
      
      # 触发器配置 - HTTP 触发器
      triggers:
        - name: http-trigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
